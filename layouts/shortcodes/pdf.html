{{- $src := .Get "src" -}}
{{- $id := delimit (seq 1 8 | shuffle) "" -}}
<div class="pdf-viewer" id="pdf-{{ $id }}" data-src="{{ $src }}">
  <div class="pdf-controls">
    <button class="pdf-prev" type="button" disabled>&#8592; Previous</button>
    <span class="pdf-page-info">Page <span class="pdf-page-num">0</span> / <span class="pdf-page-count">0</span></span>
    <button class="pdf-next" type="button" disabled>Next &#8594;</button>
    <a class="pdf-download" href="{{ $src }}" download>下载 PDF</a>
  </div>
  <div class="pdf-loading" role="status">正在加载 PDF 预览...</div>
  <div class="pdf-canvas-wrapper" style="display:none;">
    <canvas class="pdf-canvas"></canvas>
  </div>
</div>
<script>
(function() {
  var container = document.getElementById('pdf-{{ $id }}');
  if (!container) return;
  var canvas = container.querySelector('.pdf-canvas');
  var wrapper = container.querySelector('.pdf-canvas-wrapper');
  var loading = container.querySelector('.pdf-loading');
  var prevBtn = container.querySelector('.pdf-prev');
  var nextBtn = container.querySelector('.pdf-next');
  var pageNumEl = container.querySelector('.pdf-page-num');
  var pageCountEl = container.querySelector('.pdf-page-count');
  var src = container.getAttribute('data-src');
  var pdfDoc = null, pageNum = 1, pageRendering = false, pagePending = null;

  if (typeof pdfjsLib === 'undefined') {
    loading.textContent = 'PDF 预览组件不可用，可使用上方按钮直接下载。';
    return;
  }

  function updateControls() {
    prevBtn.disabled = pageNum <= 1;
    nextBtn.disabled = pageNum >= pdfDoc.numPages;
  }

  function renderPage(num) {
    pageRendering = true;
    pdfDoc.getPage(num).then(function(page) {
      var viewport = page.getViewport({scale: 1.5});
      canvas.height = viewport.height;
      canvas.width = viewport.width;
      var ctx = canvas.getContext('2d');
      var renderCtx = {canvasContext: ctx, viewport: viewport};
      var task = page.render(renderCtx);
      task.promise.then(function() {
        pageRendering = false;
        pageNumEl.textContent = num;
        loading.style.display = 'none';
        updateControls();
        if (pagePending !== null) {
          renderPage(pagePending);
          pagePending = null;
        }
      });
    });
  }

  function queuePage(num) {
    if (pageRendering) { pagePending = num; }
    else { renderPage(num); }
  }

  function onPrev() {
    if (pageNum <= 1) return;
    pageNum--;
    queuePage(pageNum);
  }

  function onNext() {
    if (pageNum >= pdfDoc.numPages) return;
    pageNum++;
    queuePage(pageNum);
  }

  var loadingTask = pdfjsLib.getDocument({
    url: src,
    disableRange: false,
    disableStream: false,
    disableAutoFetch: true
  });

  loadingTask.onProgress = function(progress) {
    if (!progress.total) return;
    var percent = Math.min(100, Math.round(progress.loaded / progress.total * 100));
    loading.textContent = '正在加载 PDF 预览... ' + percent + '%';
  };

  loadingTask.promise.then(function(pdf) {
    pdfDoc = pdf;
    pageCountEl.textContent = pdf.numPages;
    wrapper.style.display = '';
    prevBtn.addEventListener('click', onPrev);
    nextBtn.addEventListener('click', onNext);
    renderPage(1);
  }).catch(function(err) {
    loading.textContent = 'PDF 预览加载失败，可使用上方按钮直接下载。';
    loading.style.color = '#c33';
  });
})();
</script>
