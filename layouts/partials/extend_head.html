{{ if .Params.pdf }}
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>
<style>
.pdf-viewer { margin: 1.5rem 0; }
.pdf-viewer .pdf-canvas-wrapper { text-align: center; background: #f5f5f5; border-radius: 6px; overflow: auto; }
.pdf-viewer .pdf-canvas { display: block; margin: 0 auto; max-width: 100%; height: auto; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.pdf-viewer .pdf-controls { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 10px; font-family: inherit; }
.pdf-viewer .pdf-controls button { padding: 4px 14px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 14px; }
.pdf-viewer .pdf-controls button:hover { background: #f0f0f0; }
.pdf-viewer .pdf-loading { text-align: center; padding: 40px; color: #888; font-size: 14px; }
</style>
{{ end }}
{{ if .Params.math }}
<link rel="stylesheet" href="/vendor/katex/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk" crossorigin="anonymous"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    if (typeof renderMathInElement !== 'function') {
      return;
    }

    var mathBlocks = document.querySelectorAll('.math.math-display');
    for (var i = 0; i < mathBlocks.length; i++) {
      var block = mathBlocks[i];
      var source = block.textContent.trim();

      if (source.slice(0, 2) !== '$$' || source.slice(-2) !== '$$') {
        continue;
      }

      var inner = source.slice(2, -2).trim();
      var hasEnvironment = /\\begin\{[a-zA-Z*]+\}/.test(inner);
      var hasLineBreak = inner.indexOf('\\\\') !== -1;

      if (hasLineBreak && !hasEnvironment) {
        var wrapper = inner.indexOf('&') !== -1 ? 'aligned' : 'gathered';
        block.textContent = '$$\n\\begin{' + wrapper + '}\n' + inner + '\n\\end{' + wrapper + '}\n$$';
      }
    }

    var mathNodes = document.querySelectorAll('.math');
    for (var j = 0; j < mathNodes.length; j++) {
      renderMathInElement(mathNodes[j], {
        delimiters: [
          {left: '$$', right: '$$', display: true},
          {left: '$', right: '$', display: false},
          {left: '\\(', right: '\\)', display: false},
          {left: '\\[', right: '\\]', display: true}
        ],
        ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
        ignoredClasses: ['highlight', 'chroma'],
        throwOnError: false,
        strict: 'ignore'
      });
    }
  });
</script>
{{ end }}
