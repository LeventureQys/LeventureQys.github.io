{{ if .Params.pdf }}
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>
<style>
.pdf-viewer { position: relative; margin: 1.5rem 0; }
.pdf-viewer .pdf-canvas-wrapper { text-align: center; background: #f5f5f5; border-radius: 6px; overflow: auto; }
.pdf-viewer .pdf-canvas { display: block; margin: 0 auto; max-width: 100%; height: auto; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.pdf-viewer .pdf-controls { position: sticky; top: 10px; z-index: 10; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 10px; width: fit-content; max-width: calc(100% - 20px); margin: 0 auto 10px; padding: 8px 10px; border: 1px solid rgba(0,0,0,.12); border-radius: 8px; background: rgba(255,255,255,.92); box-shadow: 0 4px 14px rgba(0,0,0,.14); backdrop-filter: blur(8px); font-family: inherit; }
.pdf-viewer .pdf-controls button,
.pdf-viewer .pdf-download { display: inline-flex; align-items: center; justify-content: center; min-height: 32px; padding: 4px 14px; border: 1px solid #ccc; border-radius: 4px; background: #fff; color: #222; cursor: pointer; font: inherit; font-size: 14px; line-height: 1.4; text-decoration: none; }
.pdf-viewer .pdf-controls button:hover,
.pdf-viewer .pdf-download:hover { background: #f0f0f0; }
.pdf-viewer .pdf-controls button:disabled { cursor: not-allowed; opacity: .45; }
.pdf-viewer .pdf-download { border-color: #3b82f6; background: #3b82f6; color: #fff; }
.pdf-viewer .pdf-download:hover { background: #2563eb; color: #fff; }
.pdf-viewer .pdf-loading { text-align: center; padding: 40px; color: #888; font-size: 14px; }
body.dark .pdf-viewer .pdf-controls { border-color: rgba(255,255,255,.16); background: rgba(29,30,32,.92); }
body.dark .pdf-viewer .pdf-controls button { border-color: #555; background: #2e2e33; color: #ddd; }
body.dark .pdf-viewer .pdf-controls button:hover { background: #3a3a40; }
@media (max-width: 480px) {
  .pdf-viewer .pdf-controls { top: 6px; gap: 6px; max-width: calc(100% - 12px); padding: 6px; }
  .pdf-viewer .pdf-controls button,
  .pdf-viewer .pdf-download { padding: 4px 9px; font-size: 13px; }
}
</style>
{{ end }}
{{ if .Params.math }}
<link rel="stylesheet" href="/vendor/katex/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk" crossorigin="anonymous"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    if (typeof renderMathInElement !== 'function') {
      return;
    }

    var mathBlocks = document.querySelectorAll('.math.math-display');
    for (var i = 0; i < mathBlocks.length; i++) {
      var block = mathBlocks[i];
      var source = block.textContent.trim();

      if (source.slice(0, 2) !== '$$' || source.slice(-2) !== '$$') {
        continue;
      }

      var inner = source.slice(2, -2).trim();
      var hasEnvironment = /\\begin\{[a-zA-Z*]+\}/.test(inner);
      var hasLineBreak = inner.indexOf('\\\\') !== -1;

      if (hasLineBreak && !hasEnvironment) {
        var wrapper = inner.indexOf('&') !== -1 ? 'aligned' : 'gathered';
        block.textContent = '$$\n\\begin{' + wrapper + '}\n' + inner + '\n\\end{' + wrapper + '}\n$$';
      }
    }

    var mathNodes = document.querySelectorAll('.math');
    for (var j = 0; j < mathNodes.length; j++) {
      renderMathInElement(mathNodes[j], {
        delimiters: [
          {left: '$$', right: '$$', display: true},
          {left: '$', right: '$', display: false},
          {left: '\\(', right: '\\)', display: false},
          {left: '\\[', right: '\\]', display: true}
        ],
        ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
        ignoredClasses: ['highlight', 'chroma'],
        throwOnError: false,
        strict: 'ignore'
      });
    }
  });
</script>
{{ end }}
