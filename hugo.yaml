baseURL: https://leventureqys.github.io/
locale: en-us
title: LeventureTecTips
theme: ["PaperMod"]

taxonomies:
  category: categories
  tag: tags
  series: series

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  author: Leventure
  description: Leventure's Tech Tips
  mainSections: ["posts"]
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  homeInfoParams:
    Title: LeventureTecTips
    Content: >
      Welcome to Leventure's Tech Blog.

  socialIcons:
    - name: github
      title: GitHub
      url: "https://github.com/LeventureQys"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - name: Archive
      url: archives
      weight: 5
    - name: Search
      url: search/
      weight: 10
    - name: Tags
      url: tags/
      weight: 15
    - name: Categories
      url: categories/
      weight: 20

markup:
  goldmark:
    renderer:
      unsafe: true